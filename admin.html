<script>

  dev: {
    LINE_AUTH_URL: 'https://lxptelyviuucqmwxqxly.supabase.co/functions/v1/line-auth'

function detectEnvironment() {
  const host = (typeof window !== 'undefined' && window.location && window.location.hostname) || '';
  if (host === 'app.edgeops.jp') return 'prod';
  if (host.includes('staging') || host === 'staging.edgeops.jp') return 'staging';

}

<style>

    --green-light: #e6f9ee;
    --navy: #0f1e35;
    --bg: #f2f3f7;

  body {
    font-family: 'Yu Gothic', 'YuGothic', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    position: fixed;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    overflow: hidden;
    overscroll-behavior-y: contain;
  }

  /* ── ヘッダー ── */
  .header {
    background: var(--navy);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-title { color: white; font-size: 16px; font-weight: 700; flex: 1; }
  .header-sub { color: rgba(255,255,255,0.6); font-size: 11px; }
  .admin-badge {
    background: var(--green);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* ── 画面 ── */
  .screen { display: none; flex-direction: column; height: 100%; }
  .screen.active { display: flex; }

  /* ── ローディング ── */
  #screen-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;

  /* ── アクセス拒否 ── */

    display: none;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;

    padding: 32px;

  /* ── タブ ── */

  /* ── ローディングスピナー（小） ── */
  .loading-small {

    padding: 32px;
    color: var(--text-light);
    font-size: 13px;

  /* ── リフレッシュボタン ── */
  .refresh-btn {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;

</style>

<script>
const SUPABASE_URL = 'https://eomsdvwklntrtiiksnro.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbXNkdndrbG50cnRpaWtzbnJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTYyNjksImV4cCI6MjA5MjkzMjI2OX0.86F6pycMm9i6LNXv3q7uaq6hA_ePQ7BdJVQbHJM4ZOA';
const LIFF_ID = '2009827939-rZo06gWm';

let sb, currentUser;
let allGroups = [], allMembers = [];

const INDUSTRY_LABELS = {
  hotel: '🏨 ホテル・旅館',
  clinic: '🏥 病院・クリニック',
  care: '🏠 介護施設',
  attraction: '🎡 集客施設',
  freelance: '👥 フリーランス集団',
  club: '🏆 部活・クラブ'
};

// ── 初期化 ──
async function init() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 必ずliff.getProfile()のみで認証（?uid=パラメータ方式は廃止・セキュリティ強化）
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    // [Phase 0 5-4] auth.js の resolveEoUid を使用してeo_uidを解決
    const _auth = await resolveEoUid(sb);
    currentUser = { eo_uid: _auth.eoUid, provider: 'line', provider_uid: _auth.providerUid, display_name: _auth.displayName };
  } catch(e) {
    // [2026/5/15 昼 更新] 課題①再発(9:30〜)対応・チャッピー第28回判定 承認済み
    //   経緯:朝7:47に「expired 検知のみ」で恒久版を投入したが、9:30以降に
    //   "Invalid id_token"・isInClient=false 等の別パターンが発生し再発。
    //   真因:LIFF SDK の状態不整合は複数パターン(expired / Invalid id_token /
    //   isInClient=false 等)で出る。エラー文言の網羅は不可能。
    //   対策:catch に入った時点で問答無用で liff.logout() → liff.login() 再認可へ。
    //   設計思想:admin.html 初期化に失敗 → LIFF認証状態を一度捨てる → 再ログイン。
    //   無限ループ対策(sessionStorage retry)は後日 Phase 1 で実装予定。
    //   学び23:catch ブロックの分岐条件は限定列挙ではなく、デフォルトで安全側(再認可フォールバック)に倒す。
    console.error('[admin.html] init error:', e);
    try {
      liff.logout();
    } catch (_) {}
    liff.login();
    return;
  }

  // 超管理者チェック（adminsテーブル）
  const { data: adminRecord } = await sb
    .from('admins')
    .select('eo_uid')
    .eq('eo_uid', currentUser.eo_uid)
    .single();

  if (!adminRecord) {
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-denied').style.display = 'flex';
    return;
  }

  // 認証OK → データ読み込み
  await loadAllData();

  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-main').classList.add('active');
}

// ── 全データ読み込み ──
async function loadAllData() {
  // [Phase 4-3] loadStorageUsage を追加(既存3関数と並列実行・既存ロジック非変更)
  await Promise.all([loadStats(), loadGroups(), loadMembers(), loadStorageUsage()]);
}

// ── 統計 ──
async function loadStats() {
  const [
    { data: allGroups },
    { data: allMembers },
    { count: pendingCount },
    { count: messageCount },
    { data: industryData }
  ] = await Promise.all([
    sb.from('group_sessions').select('id'),
    sb.from('group_members').select('eo_uid, status, group_session_id'),
    sb.from('group_members').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
    sb.from('messages').select('*', { count: 'exact', head: true }),
    sb.from('group_sessions').select('id, industry')
  ]);

  // アクティブグループ（承認済みメンバーが1人以上）
  const approvedMembers = (allMembers || []).filter(m => m.status === 'approved');
  const activeGroupIds = new Set(approvedMembers.map(m => m.group_session_id));
  const totalGroups = (allGroups || []).length;
  const activeGroups = activeGroupIds.size;

  // ②総メンバー：ユニークなeo_uid（重複排除・グループ跨ぎ）
  const uniqueUids = new Set((allMembers || []).map(m => m.eo_uid));
  // ③承認済み：現在承認中のユニークeo_uid
  const uniqueApprovedUids = new Set(approvedMembers.map(m => m.eo_uid));

  const note = (t) => `<span style="font-size:10px;color:#9aa5b8;display:block;font-weight:400;margin-top:2px;">${t}</span>`;

  document.getElementById('stat-groups').innerHTML =
    `${activeGroups}<span class="stat-unit">件</span>` +
    note(`全期間作成数：${totalGroups}件`);

  document.getElementById('stat-members').innerHTML =
    `${uniqueUids.size}<span class="stat-unit">人</span>` +
    note(`承認待ち・現役・退出済を含む累計（重複なし）`);

  document.getElementById('stat-approved').innerHTML =
    `${uniqueApprovedUids.size}<span class="stat-unit">人</span>` +
    note(`現在承認中のメンバー（グループ重複なし）`);

  document.getElementById('stat-pending').innerHTML =
    `${pendingCount || 0}<span class="stat-unit">人</span>` +
    note(`承認待ちの申請数`);

  document.getElementById('stat-messages').innerHTML =
    `${messageCount || 0}<span class="stat-unit">件</span>` +
    note(`全グループの送信メッセージ合計`);

  // 業種内訳（6業種対応・アクティブグループのみ集計）
  const counts = { hotel: 0, clinic: 0, care: 0, attraction: 0, freelance: 0, club: 0 };
  (industryData || []).forEach(g => {
    // アクティブグループ（承認済みメンバーが1人以上）のみカウント
    if (activeGroupIds.has(g.id) && counts[g.industry] !== undefined) counts[g.industry]++;
  });
  const total = Object.values(counts).reduce((a, b) => a + b, 0) || 1;

  // 業種ラベル（絵文字とテキストを分離して取得）
  const INDUSTRY_SHORT = {
    hotel: 'ホテル', clinic: '病院', care: '介護',
    attraction: '集客', freelance: 'フリーランス', club: '部活'
  };

  const html = Object.entries(counts).map(([id, count]) => `
    <div class="industry-row">
      <div class="industry-label">${INDUSTRY_LABELS[id]?.split(' ')[0] || id} ${INDUSTRY_SHORT[id] || id}</div>
      <div class="bar-wrap"><div class="bar-fill bar-${id}" style="width:${Math.round(count/total*100)}%"></div></div>
      <div class="industry-count">${count}</div>
    </div>
  `).join('');
  document.getElementById('industry-breakdown').innerHTML = html;
}

// ═══════════════════════════════════════════
// [Phase 4-3] Storage使用量表示(画像投稿機能・グループ別)
// ═══════════════════════════════════════════
// 集計対象: messages + handover_notes の image_mode='attached'
// 表示: グループ別の使用量 / 上限 / 30日超分(自動削除予定見通し・Phase 5実装予定)
// 既存ロジックへの侵入ゼロ・新セクション追加のみ
// ═══════════════════════════════════════════
const STORAGE_LIMIT_BYTES_PER_GROUP = 1 * 1024 * 1024 * 1024; // 1GB/グループ(暫定値・仕様確定後に調整可能)
const STORAGE_30DAY_MS = 30 * 24 * 60 * 60 * 1000;

function _formatBytes(bytes) {
  if (!bytes || bytes <= 0) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

async function loadStorageUsage() {
  const listEl = document.getElementById('storage-usage-list');
  const summaryEl = document.getElementById('storage-usage-summary');
  const emptyEl = document.getElementById('storage-usage-empty');
  if (!listEl || !summaryEl) return;

  try {
    // [チャッピー第54回判定 GO] ⑧admin.html 写真件数表示修正
    // 旧:image_mode='attached' で絞り込み → 実装値が 'expandable'/'fixed' なので0件問題
    // 新:image_url IS NOT NULL で絞り込み(image_mode値に依存しない確実な抽出)
    const [msgRes, hwRes, groupsRes] = await Promise.all([
      sb.from('messages')
        .select('group_session_id, image_size, thumbnail_size, image_uploaded_at')
        .not('image_url', 'is', null),
      sb.from('handover_notes')
        .select('group_session_id, image_size, thumbnail_size, image_uploaded_at')
        .not('image_url', 'is', null),
      sb.from('group_sessions').select('id, group_id, industry')
    ]);

    const messages = msgRes.data || [];
    const handovers = hwRes.data || [];
    const groups = groupsRes.data || [];

    // グループ別集計
    const usageMap = {}; // group_id → { total, over30days, count }
    const now = Date.now();

    [...messages, ...handovers].forEach(item => {
      if (!item.group_session_id) return;
      if (!usageMap[item.group_session_id]) {
        usageMap[item.group_session_id] = { total: 0, over30days: 0, count: 0 };
      }
      const size = (item.image_size || 0) + (item.thumbnail_size || 0);
      usageMap[item.group_session_id].total += size;
      usageMap[item.group_session_id].count++;
      if (item.image_uploaded_at) {
        const uploaded = new Date(item.image_uploaded_at).getTime();
        if (!isNaN(uploaded) && (now - uploaded) > STORAGE_30DAY_MS) {
          usageMap[item.group_session_id].over30days += size;
        }
      }
    });

    // 全体合計
    let grandTotal = 0, grandOver30 = 0, grandCount = 0;
    Object.values(usageMap).forEach(u => {
      grandTotal += u.total;
      grandOver30 += u.over30days;
      grandCount += u.count;
    });

    // サマリー表示
    summaryEl.innerHTML = `
      <div style="display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center;">
        <span><strong style="color:#1a2f4a; font-size:14px;">合計 ${_formatBytes(grandTotal)}</strong></span>
        <span style="color:#9aa5b8;">画像 ${grandCount}件 / グループ ${Object.keys(usageMap).length}件</span>
        ${grandOver30 > 0 ? `<span style="color:#f57c00;">30日超 ${_formatBytes(grandOver30)}（自動削除予定）</span>` : ''}
      </div>
    `;

    // 画像なしの場合
    if (Object.keys(usageMap).length === 0) {
      listEl.innerHTML = '';
      if (emptyEl) emptyEl.style.display = 'block';
      return;
    }
    if (emptyEl) emptyEl.style.display = 'none';

    // グループ別行表示(使用量大きい順)
    const groupInfoMap = {};
    groups.forEach(g => { groupInfoMap[g.id] = g; });

    const sorted = Object.entries(usageMap).sort((a, b) => b[1].total - a[1].total);

    const rowsHtml = sorted.map(([groupSessionId, usage]) => {
      const g = groupInfoMap[groupSessionId];
      const displayId = g ? (g.group_id || groupSessionId.substring(0, 8)) : groupSessionId.substring(0, 8);
      const industry = g && g.industry ? (INDUSTRY_LABELS[g.industry] || g.industry) : '-';
      const pct = Math.min(100, Math.round((usage.total / STORAGE_LIMIT_BYTES_PER_GROUP) * 100));
      const pctColor = pct >= 90 ? '#e53935' : (pct >= 70 ? '#f57c00' : '#06C755');
      const over30Note = usage.over30days > 0
        ? `<span style="color:#f57c00; font-size:11px;">（30日超 ${_formatBytes(usage.over30days)}）</span>`
        : '';
      return `
        <div style="padding:10px 12px; border:1px solid #e4e8f0; border-radius:8px; margin-bottom:8px; background:white;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:8px; flex-wrap:wrap;">
            <div style="font-weight:600; color:#1a2f4a; font-size:13px;">${escHtmlAdmin(displayId)}</div>
            <div style="font-size:12px; color:#6a7a90;">${escHtmlAdmin(industry)}</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <div style="flex:1; background:#f0f3f7; border-radius:4px; height:8px; overflow:hidden;">
              <div style="width:${pct}%; height:100%; background:${pctColor}; transition:width 0.3s;"></div>
            </div>
            <div style="font-size:12px; color:#6a7a90; min-width:60px; text-align:right;">${pct}%</div>
          </div>
          <div style="font-size:11px; color:#6a7a90;">
            ${_formatBytes(usage.total)} / ${_formatBytes(STORAGE_LIMIT_BYTES_PER_GROUP)}
            ・ 画像 ${usage.count}件
            ${over30Note}
          </div>
        </div>
      `;
    }).join('');

    listEl.innerHTML = rowsHtml;
  } catch (e) {
    console.error('[Phase 4-3] Storage使用量取得失敗:', e);
    summaryEl.innerHTML = '<span style="color:#e53935;">⚠️ Storage使用量の取得に失敗しました</span>';
    listEl.innerHTML = '';
  }
}

// admin.html 内で使うHTMLエスケープ(共通化)
function escHtmlAdmin(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── グループ一覧 ──
async function loadGroups() {
  const [{ data: groups }, { data: members }] = await Promise.all([
    sb.from('group_sessions').select('*').order('created_at', { ascending: false }),
    sb.from('group_members').select('group_session_id, status')
  ]);

  // 各グループのアクティブメンバー数を計算
  const memberMap = {};
  (members || []).forEach(m => {
    if (!memberMap[m.group_session_id]) memberMap[m.group_session_id] = 0;
    if (m.status === 'approved') memberMap[m.group_session_id]++;
  });

  // アクティブグループ優先、全員離脱グループを末尾に
  const active = (groups || []).filter(g => (memberMap[g.id] || 0) > 0);
  const inactive = (groups || []).filter(g => (memberMap[g.id] || 0) === 0);
  allGroups = [...active, ...inactive];
  allGroups._memberMap = memberMap;
  renderGroups(allGroups);
}

function renderGroups(groups) {
  if (!groups.length) {
    document.getElementById('group-list').innerHTML = '<div class="empty-state">グループがありません</div>';
    return;
  }

  const memberMap = allGroups._memberMap || {};
  const html = groups.map(g => {
    const industry = g.industry || 'hotel';
    const tagClass = industry === 'hotel' ? '' : industry;
    const label = INDUSTRY_LABELS[industry] || industry;
    const dt = new Date(g.created_at);
    const dateStr = dt.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) +
      ' ' + dt.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const activeCount = memberMap[g.id] || 0;
    const isInactive = activeCount === 0;
    return `
      <div class="group-item" style="${isInactive ? 'opacity:0.45;background:#f5f5f5;' : ''}">
        <div class="group-item-header">
          <div class="group-id">${g.group_id}${isInactive ? ' <span style="font-size:10px;color:#9aa5b8;">(全員退出)</span>' : ''}</div>
          <div class="industry-tag ${tagClass}">${label}</div>
        </div>
        <div class="group-item-info">
          <span>📅 ${dateStr}作成</span>
          <span>👥 承認中: ${activeCount}人</span>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('group-list').innerHTML = html;
}

function filterGroups() {
  const q = document.getElementById('group-search').value.toLowerCase();
  const filtered = allGroups.filter(g =>
    g.group_id?.toLowerCase().includes(q) ||
    g.industry?.toLowerCase().includes(q)
  );
  renderGroups(filtered);
}

// ── メンバー一覧 ──
async function loadMembers() {
  const { data } = await sb
    .from('group_members')
    .select('*, group_sessions(group_id, industry)')
    .order('created_at', { ascending: false })
    .limit(200);

  // eo_uid + group_session_id で集約（同じ人が同じグループに複数レコードある場合、最新のcreated_atを代表とする）
  // ※ created_at の DESC で取得済みなので、各キーの最初に出てくるレコードが最新＝代表
  const memberMap = new Map();
  (data || []).forEach(m => {
    const key = `${m.eo_uid}__${m.group_session_id}`;
    if (!memberMap.has(key)) {
      memberMap.set(key, m);  // 最新のレコードのみ保持
    }
  });

  allMembers = Array.from(memberMap.values());
  renderMembers(allMembers);
}

function renderMembers(members) {
  if (!members.length) {
    document.getElementById('member-list').innerHTML = '<div class="empty-state">メンバーがいません</div>';
    return;
  }

  // 上段：approved / pending（現役）／下段：left（退出済み）に振り分け
  const activeMembers = members.filter(m => m.status === 'approved' || m.status === 'pending');
  const leftMembers = members.filter(m => m.status === 'left');

  // [2026/7/17 案2] 上段の並び順：is_creator が true → 最上部。
  //   作成者グループ内・一般グループ内とも approved_at の新しい順（最新が上）。
  activeMembers.sort((a, b) => {
    if (a.is_creator && !b.is_creator) return -1;
    if (!a.is_creator && b.is_creator) return 1;
    const aTime = a.approved_at ? new Date(a.approved_at).getTime() : 0;
    const bTime = b.approved_at ? new Date(b.approved_at).getTime() : 0;
    return bTime - aTime;   // 新しい順（降順）
  });

  // 下段の並び順：created_at の新しい順（最近退出した人が上）
  leftMembers.sort((a, b) => {
    const aTime = a.created_at ? new Date(a.created_at).getTime() : 0;
    const bTime = b.created_at ? new Date(b.created_at).getTime() : 0;
    return bTime - aTime;
  });

  const renderCard = (m) => {
    const statusClass = m.status === 'approved' ? 'approved' : m.status === 'pending' ? 'pending' : 'left';
    const statusLabel = m.status === 'approved' ? '承認済' : m.status === 'pending' ? '承認待ち' : '退出';
    const groupId = m.group_sessions?.group_id || '-';
    const creatorBadge = m.is_creator ? '<span class="creator-mark">作成者</span>' : '';
    return `
      <div class="group-item">
        <div class="group-item-header">
          <div>
            <div class="group-id" style="font-size:14px;font-family:inherit">${m.display_name || '名無し'}${creatorBadge}</div>
            <div style="font-size:10px;color:#9aa5b8;font-family:monospace;margin-top:2px">${m.eo_uid?.substring(0, 20)}...</div>
          </div>
          <div class="status-badge status-${statusClass}">${statusLabel}</div>
        </div>
        <div class="group-item-info">
          <span>🏢 ${groupId}</span>
          <span>${m.group_sessions ? INDUSTRY_LABELS[m.group_sessions.industry] || '' : ''}</span>
        </div>
      </div>
    `;
  };

  let html = '';

  // 上段：現役メンバー
  if (activeMembers.length) {
    html += activeMembers.map(renderCard).join('');
  } else {
    html += '<div class="empty-state">現役メンバーはいません</div>';
  }

  // 下段：退出済み（折りたたみ）
  if (leftMembers.length) {
    html += `
      <div class="left-section-header" onclick="toggleLeftSection()">
        <span class="left-section-title">🚪 退出済み (${leftMembers.length})</span>
        <span class="left-section-arrow" id="left-arrow">▶</span>
      </div>
      <div class="left-section-body" id="left-section-body">
        ${leftMembers.map(renderCard).join('')}
      </div>
    `;
  }

  document.getElementById('member-list').innerHTML = html;
}

function toggleLeftSection() {
  const body = document.getElementById('left-section-body');
  const arrow = document.getElementById('left-arrow');
  if (body && arrow) {
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  }
}

function filterMembers() {
  const q = document.getElementById('member-search').value.toLowerCase();
  const filtered = allMembers.filter(m =>
    m.display_name?.toLowerCase().includes(q) ||
    m.eo_uid?.toLowerCase().includes(q)
  );
  renderMembers(filtered);
}

// ── タブ切り替え ──
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');
}

init();
</script>

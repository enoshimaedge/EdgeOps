<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeOps サイネージ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #06C755;
    --navy: #0f1e35;
    --bg: #f2f3f7;
    --white: #ffffff;
    --text: #1a2f4a;
    --text-light: #9aa5b8;
    --border: #e4e8f0;
    --red: #e53935;
    --orange: #f57c00;
  }

  body {
    font-family: 'Yu Gothic', 'YuGothic', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── エラー画面 ── */
  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 40px;
    text-align: center;
    background: var(--navy);
  }
  #error-screen.active { display: flex; }
  .error-icon { font-size: 64px; margin-bottom: 24px; }
  .error-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #ff6b6b; }
  .error-message { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; }

  /* ── メイン画面 ── */
  #main-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    max-height: 100dvh;
    overflow: hidden;
  }
  #main-screen.active { display: flex; }

  /* ── ヘッダー ── */
  .signage-header {
    background: var(--green);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .signage-logo {
    /* [UI改善 2026/5/23] サイネージでもグループ名を主役に。EdgeOps を 24px→16px に縮小・font-weight 900→700 */
    /* 理由:大画面サイネージ表示で「いまどのグループか」を一目で視認させる */
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 1px;
  }
  .signage-group-name {
    /* [UI改善 2026/5/23] グループ名を 16px→32px に拡大・font-weight 700 維持 */
    /* index.html の screen-home ヘッダー(EdgeOps小・グループ名大)と統一思想 */
    font-size: 32px;
    color: white;
    font-weight: 700;
    line-height: 1.2;
    margin-top: 2px;
  }
  .last-updated {
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    text-align: right;
    font-weight: 600;
  }

  /* ── グループ期限警告バー ── */
  .expiry-warning-bar {
    padding: 12px 20px;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    line-height: 1.5;
    flex-shrink: 0;
    display: none;
  }
  .expiry-warning-bar.warning {
    background: #fff8e1;
    border-bottom: 2px solid #ffc107;
    color: #e65100;
    display: block;
  }
  .expiry-warning-bar.danger {
    background: #ffebee;
    border-bottom: 2px solid #e53935;
    color: #c62828;
    display: block;
  }
  /* 混雑度ボタン */
  .vacan-header-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 6px 12px;
    color: white;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    text-decoration: none;
    margin-top: 4px;
  }

  /* ── コンテンツエリア ── */
  /* ── メインレイアウト：上スクロール＋下固定 ── */
  .signage-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px;
    overflow: hidden;
    min-height: 0;
  }

  /* 上部：メッセージ（スクロール可・残りスペース全て） */
  #card-message {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 下部：天気とQRを横並び固定 */
  .signage-bottom {
    display: flex;
    gap: 10px;
    height: 28vh;
    min-height: 160px;
    max-height: 240px;
    flex-shrink: 0;
  }

  #card-weather {
    flex: 1;
    min-width: 0;
  }

  #card-qr {
    flex: 1;
    min-width: 0;
    align-items: center;
  }

  /* ── カード共通 ── */
  .s-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .s-card-title {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  /* ── 今日の連絡カード ── */
  #card-message {
    grid-column: 1 / 2;
    grid-row: 1 / 3;
    overflow: hidden;
  }
  .message-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .message-list::-webkit-scrollbar { width: 4px; }
  .message-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .message-item {
    padding: 10px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border-left: 3px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .message-item.urgent { border-left-color: #e53935; background: rgba(255,234,234,0.08); }
  .message-item.normal { border-left-color: #f9a825; background: rgba(255,253,231,0.05); }
  .message-item.info   { border-left-color: #66bb6a; background: rgba(241,248,244,0.05); }
  .message-priority {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .priority-urgent { background: #ffeaea; color: #c62828; border: 1px solid #e53935; }
  .priority-normal { background: #fffde7; color: #f57f17; border: 1px solid #f9a825; }
  .priority-info   { background: #f1f8f4; color: #2e7d32; border: 1px solid #66bb6a; }
  .message-body {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    color: white;
  }
  /* 2行以上は折りたたみ */
  .message-body.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .message-body.expanded {
    display: block;
  }
  .message-time {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }
  .no-message {
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    flex: 1;
    display: flex;
    align-items: center;
  }

  /* ── 天気カード ── */
  #card-weather {
    grid-column: 2 / 3;
    grid-row: 1 / 2;
  }
  .weather-row {
    display: flex;
    gap: 6px;
    flex: 1;
    flex-direction: row;
  }
  .weather-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 6px 4px;
  }
  .weather-day-left { display: none; }
  .weather-day-label {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .weather-icon { font-size: 36px; margin-bottom: 4px; }
  .weather-temp-block { text-align: center; }
  .weather-temp {
    font-size: 28px;
    font-weight: 700;
    color: white;
  }
  .weather-temp-range {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-top: 3px;
  }
  .weather-error {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── 祝日カード（天気カード内に統合表示） ── */
  .holiday-bar {
    background: rgba(255, 193, 7, 0.2);
    border: 1px solid rgba(255, 193, 7, 0.4);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #FFD54F;
    margin-top: 8px;
    flex-shrink: 0;
    text-align: center;
  }

  /* ─── [熱中症予防情報 2026/5/28 案B] 全幅バッジ・メッセージエリア直下 ─── */
  /* 配置: signage-grid 直下・signage-bottom より上・折りたたみ対象外
     表示条件: 5〜9月かつ WBGT 21(注意)以上で表示
     2値表示: 現在値(リアルタイム) と 今日の最大予測値(1日固定)
     色: 2つのうち高い方のレベルで決定 */
  /* 親要素自体を縦並びFlexにすることで子要素が確実に縦積みになる */
  #heatstroke-display.heatstroke-bar-full {
    border-radius: 10px;
    padding: 8px 12px;
    font-weight: 700;
    flex-shrink: 0;
    text-align: center;
    line-height: 1.3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    box-sizing: border-box;
    margin: 6px 0;
    gap: 2px;
  }
  /* タイトル行: 何の情報か明示 */
  #heatstroke-display.heatstroke-bar-full .hs-title {
    width: 100%;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    opacity: 0.7;
    letter-spacing: 0.5px;
    white-space: normal;
    line-height: 1.2;
  }
  /* 値表示行: 今 + 値 ／ 今日の最大 + 値 */
  #heatstroke-display.heatstroke-bar-full .hs-values {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    width: 100%;
  }
  .heatstroke-bar-full.hs-caution {
    background: rgba(255, 235, 59, 0.18);
    border: 1px solid rgba(255, 235, 59, 0.4);
    color: #FFF59D;
  }
  .heatstroke-bar-full.hs-warning {
    background: rgba(255, 152, 0, 0.20);
    border: 1px solid rgba(255, 152, 0, 0.5);
    color: #FFCC80;
  }
  .heatstroke-bar-full.hs-severe {
    background: rgba(255, 87, 34, 0.22);
    border: 1px solid rgba(255, 87, 34, 0.55);
    color: #FFAB91;
  }
  .heatstroke-bar-full.hs-danger {
    background: rgba(244, 67, 54, 0.28);
    border: 1px solid rgba(244, 67, 54, 0.7);
    color: #FF8A80;
  }
  .heatstroke-bar-full .hs-section {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
  }
  .heatstroke-bar-full .hs-section-label {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.7;
  }
  .heatstroke-bar-full .hs-section-value {
    font-size: 13px;
    font-weight: 700;
  }
  .heatstroke-bar-full .hs-divider {
    opacity: 0.4;
    font-weight: 400;
  }
  #heatstroke-display.heatstroke-bar-full .hs-advice {
    width: 100%;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    opacity: 0.95;
    line-height: 1.3;
    white-space: nowrap;        /* サイネージ大画面では1行に収める(改行禁止) */
    overflow: hidden;            /* 万一はみ出しても下に押し出さない */
    text-overflow: ellipsis;     /* はみ出した場合は…で省略 */
  }
  /* 注釈: 行動指針と同じ行にインライン表示(改行しない) */
  #heatstroke-display.heatstroke-bar-full .hs-note-inline {
    font-size: 9px;
    font-weight: 400;
    opacity: 0.55;
  }

  /* ── QRカード ── */
  #card-qr {
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    align-items: center;
  }
  .qr-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #qr-canvas {
    background: white;
    border-radius: 8px;
    padding: 6px;
  }
  .qr-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 1.4;
    padding: 4px 0 6px;
  }

  /* ── ローディング ── */
  #loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── オフラインバナー ── */
  #offline-banner {
    display: none;
    background: var(--orange);
    color: white;
    text-align: center;
    padding: 6px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  #offline-banner.show { display: block; }
  /* ══════════════════════════════════════════════════════
   * [UI改善② LINKボタン] チャッピー第50回判定準拠
   * - グループ管理者が index.html で設定したカスタムURLを表示
   * - link_url 未設定時は非表示
   * - 既存 vacan-header-btn と同寸法・並んで表示
   * ══════════════════════════════════════════════════════ */
  .link-header-btn {
    display: none;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 5px 10px;
    color: white;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .link-header-btn:hover { background: rgba(255,255,255,0.3); }

  /* ══════════════════════════════════════════════════════
   * [UI改善③ 天気QR折りたたみ] チャッピー第50回判定準拠
   * - signage-bottom 全体(天気カード+QRカード)をアコーディオン化
   * - 初期状態は展開・localStorage で状態保持
   * - 天気取得・QR生成・ポーリング・認証には触らない(条件8)
   * ══════════════════════════════════════════════════════ */
  .signage-bottom {
    transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.25s ease, padding 0.25s ease;
    overflow: hidden;
    opacity: 1;
  }
  .signage-bottom.collapsed {
    max-height: 0 !important;
    min-height: 0 !important;
    height: 0 !important;
    opacity: 0;
    margin-top: 0 !important;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
  }
  .bottom-toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .bottom-toggle-btn:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<!-- ローディング -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px; color:rgba(255,255,255,0.5);">読み込み中...</div>
</div>

<!-- エラー画面 -->
<div id="error-screen">
  <div class="error-icon">⚠️</div>
  <div class="error-title" id="error-title">サイネージURLが無効です</div>
  <div class="error-message" id="error-message">管理者にお問い合わせください</div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <!-- オフラインバナー -->
  <div id="offline-banner">⚠️ オフライン中 — 表示中の情報は最新でない場合があります</div>

  <!-- ヘッダー -->
  <div class="signage-header">
    <div>
      <div class="signage-logo">EdgeOps</div>
      <div class="signage-group-name" id="header-group-name">---</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
      <div class="last-updated" id="last-updated-display">最終更新：--:--</div>
      <!-- [チャッピー第53回判定後] LINK + 混雑度を横並びに配置(野口さん指示:混雑度の左にLINK) -->
      <!-- [チャッピー第54回判定後・最終修正] 5/14以前の動いていた button タグ形式に完全復帰(a タグ・event.preventDefault は外す) -->
      <div style="display:flex; flex-direction:row; gap:6px; align-items:center;">
        <button id="link-btn"
           onclick="openCustomLinkSignage()"
           class="link-header-btn vacan-header-btn" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          LINK
        </button>
        <button id="vacan-btn"
           onclick="window.location.href='https://vacan.com/map/35.299694,139.480194,13?isOpendata=false&areaName=enoshima'"
           class="vacan-header-btn" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          混雑度
        </button>
      </div>
    </div>
  </div>

  <!-- グループ期限警告バー(ST版・残り30日以下のみ表示) -->
  <div id="expiry-warning-bar" class="expiry-warning-bar"></div>

  <!-- コンテンツ -->
  <div class="signage-body">

    <!-- 引き継ぎノート＋連絡（全体ひとつのスクロール） -->
    <div class="s-card" id="card-message">
      <div class="message-list" id="message-list-all" style="flex:1; overflow-y:auto;">
        <!-- 引き継ぎノートセクション -->
        <div id="section-handover" style="display:none;">
          <div class="s-card-title" style="margin-bottom:6px;">📋 引き継ぎノート（72時間で非表示）</div>
          <div id="handover-list"></div>
          <div id="handover-accordion-btn" style="display:none; text-align:center; padding:6px 0 4px; font-size:13px; color:var(--green); cursor:pointer; font-weight:700;" onclick="toggleHandoverAccordion()"></div>
        </div>
        <!-- 区切り線 -->
        <div id="section-divider" style="display:none; border-top:1px solid rgba(255,255,255,0.15); margin:8px 0;"></div>
        <!-- 連絡セクション -->
        <div id="section-message">
          <div class="s-card-title" id="message-section-title" style="margin-bottom:6px; display:none;">💬 連絡</div>
          <div id="message-list"></div>
        </div>
      </div>
    </div>

    <!-- [熱中症予防情報 2026/5/28 案B] 全幅バッジ・メッセージエリア直下・折りたたみ対象外
         5〜9月のみ表示・WBGT 21(注意)以上で表示・両方20以下なら非表示 -->
    <div id="heatstroke-display" class="heatstroke-bar-full" style="display:none;"></div>

    <!-- [UI改善③ 天気QR折りたたみ] チャッピー第50回判定準拠
         トグルボタン押下で signage-bottom 全体(天気+QR)を折りたたむ
         localStorage 'signage_bottom_collapsed' で状態保持 -->
    <button id="bottom-toggle-btn" class="bottom-toggle-btn" onclick="toggleBottomAccordion()">
      <span id="bottom-toggle-icon">▼</span>
      <span id="bottom-toggle-label">折りたたむ</span>
    </button>

    <!-- 天気・祝日 + QRコード（下部固定） -->
    <div class="signage-bottom" id="signage-bottom">
      <div class="s-card" id="card-weather">

// ═══════════════════════════════════════════
// signage_token の localStorage 復元 (チャッピー第2回判定 GO)
// ═══════════════════════════════════════════
// 目的: Fully Kiosk の startURL は token なし
//   (https://app.edgeops.jp/signage.html) のまま維持し、
//   WebView 更新再起動・定期リロード後も端末保存の token で自動復帰する。
//   - startURL に token を直書きしない (トークン再生成のたびの現地再設定を回避=運用8原則⑥維持)
//   - URL に token を出し続けない (URLから即座に除去=原則④⑤維持)
const SIGNAGE_TOKEN_STORAGE_KEY = 'signage_token';

// token 取得の単一窓口:
//   ① URL パラメータに token があれば → localStorage に保存し、URL から除去して返す
//   ② URL に無ければ → localStorage の保存済み token を復元して返す
//   ③ どちらも無ければ null
function getSignageToken() {
  let token = null;
  try {
    const params = new URLSearchParams(window.location.search);
    token = params.get('token');
  } catch (e) {
    token = null;
  }

  if (token) {
    // ① URL 由来 token を保存し、URL から token を消す (画面・履歴に残さない)
    try {
      localStorage.setItem(SIGNAGE_TOKEN_STORAGE_KEY, token);
    } catch (e) {
      // localStorage 不可環境でも認証自体は URL token で続行
      console.warn('[getSignageToken] localStorage write failed:', e?.message);
    }
    try {
      history.replaceState(null, '', window.location.pathname);
    } catch (e) {
      console.warn('[getSignageToken] history.replaceState failed:', e?.message);
    }
    return token;
  }

  // ② URL に無ければ localStorage から復元
  try {
    const saved = localStorage.getItem(SIGNAGE_TOKEN_STORAGE_KEY);
    if (saved) return saved;
  } catch (e) {
    console.warn('[getSignageToken] localStorage read failed:', e?.message);
  }
  return null;
}

// 保存済み token を破棄 (明示的な INVALID_TOKEN / EXPIRED 応答時のみ呼ぶ)
function clearSignageToken() {
  try {
    localStorage.removeItem(SIGNAGE_TOKEN_STORAGE_KEY);
  } catch (e) {
    console.warn('[clearSignageToken] localStorage remove failed:', e?.message);
  }
}

// signage-fetch の応答が「明示的なトークン無効」かどうかを判定する単一窓口。
//   true  → 無効画面へ落とし、localStorage の token も破棄する対象
//           (INVALID_TOKEN=401 / EXPIRED=403 … signage-fetch が明示的に返すコード)
//   false → 一時障害 (INTERNAL_ERROR=500 / 5xx / NETWORK_ERROR / タイムアウト /
//           不明な error_code / エラーJSON) とみなし、現在表示を維持してリトライ
// ※ allowlist 方式: 明示的な無効コードだけを無効扱いにし、それ以外は決して無効画面に落とさない。
//   これにより Supabase 一時障害・ホテル側ネットワーク障害で誤って無効化されない。
function isExplicitTokenInvalid(data) {
  if (!data) return false;
  return data.error_code === 'INVALID_TOKEN' || data.error_code === 'EXPIRED';
}

  const isCollapsed = bottom.classList.toggle('collapsed');

  let saved = null;
  try {
    saved = localStorage.getItem(SIGNAGE_BOTTOM_STORAGE_KEY);
  } catch (e) {
    console.warn('[restoreBottomAccordionState] localStorage read failed:', e);
  }
  // 保存値が 'true' のときのみ折りたたみ状態で起動・それ以外は展開(初期状態)
  if (saved === 'true') {

    if (bottom) bottom.classList.add('collapsed');

  }
}

  const dd = now.getDate();
  const wd = weekdays[now.getDay()];
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('last-updated-display').textContent =
    `最終更新：${now.getFullYear()}年${mo}月${dd}日（${wd}）${hh}:${mm}`;
}

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

// ═══════════════════════════════════════════
// signage-fetch Edge Function 経由データ取得
// ═══════════════════════════════════════════
// チャッピー第68回判定 v2 反映:全 DB アクセスを Edge Function 経由に統一
// service_role キーで認証バイパスし、L3 RLS 完遂後も動作する設計
async function fetchSignageData() {
  // token は getSignageToken() で URL / localStorage の両対応 (第2回判定 GO)
  const token = getSignageToken();
  if (!token) {
    return { ok: false, error_code: 'NO_TOKEN' };
  }
  try {
    const res = await fetch(SIGNAGE_FETCH_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ token })
    });

    // ─── レスポンス JSON 解析 (5xx で HTML が返る等、JSON でない場合も一時障害扱い) ───
    let data = null;
    try {
      data = await res.json();
    } catch (parseErr) {
      // JSON パース不能 (502/503/504 の HTML 等) は一時障害として表示維持
      console.warn('[fetchSignageData] non-JSON response, status:', res.status);
      return { ok: false, error_code: 'SERVER_ERROR', http_status: res.status };
    }

    // signage-fetch は明示無効時 error_code を返す (INVALID_TOKEN=401 / EXPIRED=403)。
    // ただし INTERNAL_ERROR=500 等の一時障害コードはそのまま通し、
    // 呼び出し側 (isExplicitTokenInvalid) で allowlist 判定させる。
    return data;
  } catch (e) {
    console.warn('[fetchSignageData] network error:', e?.message);
    return { ok: false, error_code: 'NETWORK_ERROR' };
  }
}

// ═══════════════════════════════════════════
// 認証チェック（3段階）
// ═══════════════════════════════════════════
async function authenticate() {
  // ① token 確認 (URL パラメータ or localStorage 復元・第2回判定 GO)
  //    URL に token があれば localStorage に保存し URL から除去、
  //    無ければ localStorage の保存済み token を復元する。
  const token = getSignageToken();

  if (!token) {
    // URL にも localStorage にも token が無い = 一度も正規起動していない端末。
    // この場合のみ「URL 無効」を表示 (LINE のサイネージボタンからの起動が必要)。
    showError(
      'サイネージURLが無効です',
      'URLにトークンが含まれていません。\nグループ管理者にお問い合わせください。'
    );
    return false;
  }

  // ② signage-fetch Edge Function 経由でデータ取得 (チャッピー第68回判定 v2)
  try {
    const data = await fetchSignageData();

    // ─── (A) 明示的なトークン無効 (INVALID_TOKEN / EXPIRED) のみ無効画面へ ───
    //     このときだけ localStorage の token も破棄する
    //     (トークン再生成・退職者/譲渡端末の締め出しはここで成立)
    if (isExplicitTokenInvalid(data)) {
      clearSignageToken();
      showError(
        'サイネージが無効になりました',
        'グループ管理者がトークンを再生成しました。\n一度グループを退出して、再度参加してください。'
      );
      return false;
    }

    // ─── (B) 認証成功 ───
    if (data && data.ok && data.group) {
      currentGroupData = data.group;
      _globalSignageData = data;
      return true;
    }

    // ─── (C) それ以外はすべて一時障害扱い ───
    //     INTERNAL_ERROR=500 / SERVER_ERROR / NETWORK_ERROR / 不明 error_code 等。
    //     token は破棄せず「接続エラー・自動リトライ」表示にとどめ、
    //     定期リトライ (下の scheduleAuthRetry) でサーバー復旧後に自動復帰する。
    //     ※ 無効画面には絶対に落とさない (Supabase 一時障害での誤無効化を防止)
    console.warn('[authenticate] transient failure, will retry:', data?.error_code);
    showError(
      '接続エラー',
      'サーバーへ接続できません。\n自動的に再試行します…'
    );
    scheduleAuthRetry();
    return false;
  } catch (e) {
    // 例外も一時障害として自動リトライ (無効画面には落とさない)
    console.warn('[authenticate] exception, will retry:', e?.message);
    showError(
      '接続エラー',
      'サーバーへ接続できません。\n自動的に再試行します…'
    );
    scheduleAuthRetry();
    return false;
  }
}

// ═══════════════════════════════════════════
// 認証リトライ (一時障害からの自動復帰・第2回判定 GO)
// ═══════════════════════════════════════════
// 一時障害 (INTERNAL_ERROR / 5xx / NETWORK_ERROR 等) で認証できなかったとき、
// 一定間隔で init() を再実行してサーバー復旧後に自動で本表示へ合流する。
// - 明示無効 (INVALID_TOKEN / EXPIRED) では呼ばれない (無効画面で確定)
// - 多重起動しないよう単一タイマーで管理
// - 復旧不能でも 60秒ごとに静かに再試行し続ける (無人サイネージ前提)
let _authRetryTimer = null;
const AUTH_RETRY_INTERVAL_MS = 60 * 1000; // 60秒ごと

function scheduleAuthRetry() {
  if (_authRetryTimer) return; // 既にリトライ予約済みなら二重予約しない
  _authRetryTimer = setTimeout(async () => {
    _authRetryTimer = null;
    console.warn('[scheduleAuthRetry] retrying init...');
    // オフライン中は無駄打ちを避け、次のインターバルまで待つ
    if (!navigator.onLine) {
      scheduleAuthRetry();
      return;
    }
    // init() を再実行。成功すれば hideError→本表示へ合流、
    // 再び一時障害なら authenticate 内で再度 scheduleAuthRetry() が呼ばれる。
    try {
      await init();
    } catch (e) {
      console.warn('[scheduleAuthRetry] init retry failed:', e?.message);
      scheduleAuthRetry();
    }
  }, AUTH_RETRY_INTERVAL_MS);
}

// ═══════════════════════════════════════════
// アコーディオン制御（引き継ぎ5件超）
// ═══════════════════════════════════════════
const HANDOVER_SHOW_COUNT = 5; // 折りたたみ前の最大表示数
let _handoverAllItems = []; // 全引き継ぎデータを保持

function toggleHandoverAccordion() {
  const btn = document.getElementById('handover-accordion-btn');
  const list = document.getElementById('handover-list');
  const isExpanded = btn.dataset.expanded === '1';
  if (isExpanded) {
    // 折りたたむ
    renderHandoverList(_handoverAllItems, false);
    btn.dataset.expanded = '0';
  } else {
    // 展開する
    renderHandoverList(_handoverAllItems, true);
    btn.dataset.expanded = '1';
  }
}

function renderHandoverList(items, showAll) {
  const list = document.getElementById('handover-list');
  const btn = document.getElementById('handover-accordion-btn');
  const displayItems = showAll ? items : items.slice(0, HANDOVER_SHOW_COUNT);
  list.innerHTML = displayItems.map(item => buildItemHtml(item)).join('');
  if (items.length > HANDOVER_SHOW_COUNT) {
    btn.style.display = 'block';
    if (showAll) {
      btn.textContent = '▲ 折りたたむ';
      btn.dataset.expanded = '1';
    } else {
      btn.textContent = `▼ すべて見る（${items.length}件）`;
      btn.dataset.expanded = '0';
    }
  } else {
    btn.style.display = 'none';
  }
}

// ═══════════════════════════════════════════
// テキスト内のメールアドレス・URLを検出してリンク化（モーダル用）
// ⑦ mailto、⑧ URLリンク
// ═══════════════════════════════════════════
function linkifyBody(text) {
  // XSS対策：まずHTMLエスケープ
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  // ⑦ メールアドレスはテキストのままで表示（Fully KioskではmailtoでメーラーNG）
  const withMail = escaped;

  // ⑧ URL → window.location.hrefで同ウィンドウ遷移（Fully Kioskで動作する方法）
  // &amp; を & に戻してから遷移
  const withLinks = withMail.replace(
    /(https?:\/\/[^\s&<>"]+(?:&amp;[^\s&<>"]*)*)/g,
    (match) => {
      const cleanUrl = match.replace(/&amp;/g, '&');
      const safeUrl = cleanUrl.replace(/'/g, '%27');
      return `<a href="javascript:void(0)" onclick="window.location.href='${safeUrl}'" style="color:#64d2ff; text-decoration:underline; word-break:break-all; cursor:pointer;">${match}</a>`;
    }
  );

  return withLinks;
}

// ═══════════════════════════════════════════
// カードHTMLを生成する共通関数
// ═══════════════════════════════════════════
let _buildItemContext = {}; // buildItemHtmlが参照するコンテキスト

function buildItemHtml(item) {
  const { allMembers, humanMembers, humanCount, readCountMap, confirmedMap, msgPriorityMap, surveyResponseCountMap, memberJoinedAt } = _buildItemContext;
  const p = item._type === 'handover'
    ? getHandoverLabel(item)
    : (msgPriorityMap[item.priority] || msgPriorityMap.normal);
  const createdAt = new Date(item.created_at);
  const mo = createdAt.getMonth() + 1;
  const dd = createdAt.getDate();
  const hh = String(createdAt.getHours()).padStart(2, '0');
  const mm = String(createdAt.getMinutes()).padStart(2, '0');
  const timeStr = mo + '月' + dd + '日 ' + hh + ':' + mm;
  const body = item.body || '';
  // ⑥ 本文が長い場合は折りたたみ（モーダルで全文表示）
  const isLong = body.length > 60 || body.split('\n').length > 2;

  // 既読/確認バッジ
  let readBadge = '';
  if (humanCount > 0) {
    if (item._type === 'message') {
      const readCount = readCountMap[item.id] || 0;
      // ════════════════════════════════════════════════════════════
      // [既読バッジ分母仕様 / チャッピー第55-2回判定確定 / 2026-05-18]
      // 送信時点で確定した受信者数を分母とする(index.html L3153 と同一方式)
      // 優先順:
      //   ① item.receiver_count (送信時にDB保存された送信時点の固定値)
      //   ② 旧データ・NULL の場合は memberJoinedAt で送信時点フィルタして算出
      // これにより、後から参加したメンバー(例:五郎S)が分母に入らない
      // ════════════════════════════════════════════════════════════
      let receiverCount;
      if (item.receiver_count != null) {
        receiverCount = item.receiver_count;
      } else {
        const itemCreatedAtMs = new Date(item.created_at).getTime();
        receiverCount = humanMembers.filter(m => {
          if (m.eo_uid === item.sender_eo_uid) return false;           // C
          if (memberJoinedAt) {
            const joinedAt = memberJoinedAt.get(m.eo_uid);
            if (joinedAt !== undefined && joinedAt > itemCreatedAtMs) return false; // D
          }
          return true;
        }).length;
      }
      if (receiverCount === 0) {
        // [2026/5/25 1人グループ論理破綻対応 / チャッピー第87回判定GO]
        // 受信者0名(送信時点で送信者以外いない)→ 既読対象なし表示
        readBadge = `<span style="font-size:10px; color:#94a3b8; font-weight:700;">📋 対象者なし</span>`;
      } else if (readCount >= receiverCount) {
        readBadge = `<span style="font-size:10px; color:#66bb6a; font-weight:700;">✅ 全員既読</span>`;
      } else {
        readBadge = `<span style="font-size:10px; color:#f9a825; font-weight:700;">⚠ ${readCount}/${receiverCount}人既読</span>`;
      }
    } else {
      const confirmedCount = item._confirmed || 0;
      if (confirmedCount === 0) {
        readBadge = `<span style="font-size:10px; color:#e53935; font-weight:700;">❗ 未確認</span>`;
      } else {
        const confirmerNames = (confirmedMap[item.id] || []).map(c => c.display_name).join('・');
        readBadge = `<span style="font-size:10px; color:#66bb6a; font-weight:700;">✅ ${confirmerNames}が確認済</span>`;
      }
    }
  }
  const senderMember = allMembers.find(m => m.eo_uid === item.sender_eo_uid);
  const senderName = senderMember ? senderMember.display_name + '　' : '';

  // onclickはdata属性に逃がしてシングルクォート問題を回避（⑧対応）
  const itemIndex = _buildItemContext.allItemsFlat.indexOf(item);

  // ── アンケートラベル（メッセージで is_survey=true のときのみ表示） ──
  // スマホ画面と統一：回答数(分子/分母)を表示
  let surveyLabel = '';
  let surveyDeadlineLabel = '';
  if (item._type === 'message' && item.is_survey === true) {
    const respMap = surveyResponseCountMap || {};
    const surveyAnsweredCount = respMap[item.id] || 0;
    // 分母：人間メンバー（サイネージ除外）の人数
    const surveyDenominator = humanCount;
    surveyLabel = `<span class="message-priority" style="background:#e8f5e9; color:#2e7d32; border:1px solid #66bb6a; margin-left:6px;">📊 アンケート ${surveyAnsweredCount}/${surveyDenominator}人回答</span>`;
    // 締切日表示
    if (item.survey_deadline) {
      const deadline = new Date(item.survey_deadline);
      const nowTime = Date.now();
      if (deadline.getTime() < nowTime) {
        surveyDeadlineLabel = `<span class="message-priority" style="background:#ffeaea; color:#c62828; border:1px solid #ef9a9a; margin-left:6px;">📅 回答締切済</span>`;
      } else {
        const dateStr = `${deadline.getMonth() + 1}月${deadline.getDate()}日`;
        surveyDeadlineLabel = `<span class="message-priority" style="background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; margin-left:6px;">📅 ${dateStr}</span>`;
      }
    }
  }

  // ── [簡素案・サイネージ画像表示] 画像ありラベル ──
  // 設計:
  //   - 判定式: image_url または thumbnail_url が存在するか
  //   - 画像本体・サムネは表示せず「📷 画像あり」アイコンのみ
  //   - サイネージは表示専用(編集UIなし)
  //   - Edge Function 呼び出しなし・DB変更なし・既存ロジックには触らない
  //   - メッセージ・引き継ぎノート両方に対応(両者とも buildItemHtml を通るため)
  //   [チャッピー第53回判定後] image_mode 依存を撤廃(値の不整合対策)
  let imageLabel = '';
  if (item.image_url || item.thumbnail_url) {
    imageLabel = `<span class="message-priority" style="background:rgba(33,150,243,0.15); color:#90caf9; border:1px solid rgba(144,202,249,0.5); margin-left:6px;">📷 画像あり</span>`;
  }

  return `
    <div class="message-item ${p.itemCls}" onclick="openModalByIndex(${itemIndex})" style="cursor:pointer;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <div style="display:flex; align-items:center; flex-wrap:wrap;"><span class="message-priority ${p.cls}">${p.label}</span>${surveyLabel}${surveyDeadlineLabel}${imageLabel}</div>
        ${readBadge}
      </div>
      <div class="message-body${isLong ? ' collapsed' : ''}">${escHtmlSignage(body)}</div>
      <div class="message-time">${senderName}${timeStr} 送信${isLong ? '　<span style="font-size:10px; color:rgba(255,255,255,0.3);">タップで全文表示</span>' : ''}</div>
    </div>
  `;
}

function escHtmlSignage(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════
// 引き継ぎラベルを確認状況で決定（共通化）
// ═══════════════════════════════════════════
function getHandoverLabel(item) {
  const isConfirmed = item._fullyConfirmed || item._confirmed > 0;
  if (item.priority === 'action') {
    return isConfirmed
      ? { label: '🔴 重要・対応済', cls: 'priority-urgent', itemCls: 'urgent' }
      : { label: '🔴 重要・未確認', cls: 'priority-urgent', itemCls: 'urgent' };
  }
  if (item.priority === 'done') {
    return { label: '🟢 確認要・確認済', cls: 'priority-info', itemCls: 'info' };
  }
  return isConfirmed
    ? { label: '🟡 通常・確認済', cls: 'priority-normal', itemCls: 'normal' }
    : { label: '🟡 通常・未確認', cls: 'priority-normal', itemCls: 'normal' };
}

// ═══════════════════════════════════════════
// 今日の連絡を取得・表示
// ═══════════════════════════════════════════
async function loadMessage() {
  try {
    // ─── signage-fetch 経由化 (チャッピー第68回判定 v2 反映) ───
    // 5分ごとのポーリングで startPolling から _globalSignageData が更新される
    // 初回呼び出し (init から) では authenticate で取得済みのデータを使う
    // 連絡は過去60日分のみ取得（DBには残るが表示しない）/ 引き継ぎは過去72時間
    // → cutoff は signage-fetch Edge Function 内で適用済み

    if (!_globalSignageData || !_globalSignageData.ok) {
      // 異常時: 何も表示しない (showError は startPolling から呼ばれる)
      return;
    }

    const messages = _globalSignageData.messages || [];
    const handovers = _globalSignageData.handover_notes || [];

    // 連絡のpriorityMap
    const msgPriorityMap = {
      urgent: { label: '🔴 緊急', cls: 'priority-urgent', itemCls: 'urgent', order: 0 },
      normal: { label: '🟡 通常', cls: 'priority-normal', itemCls: 'normal', order: 1 },
      info:   { label: '🟢 連絡', cls: 'priority-info',   itemCls: 'info',   order: 2 },
    };

    // 既読・確認情報・メンバー情報はすべて _globalSignageData から取得
    // ════════════════════════════════════════════════════════════
    // [既読・確認集計仕様 / チャッピー第55-2回判定確定 / 2026-05-18]
    // A. 分母は送信時点で approved だった人間メンバーのみ
    // B. サイネージ端末(is_signage=true)は分母・分子から除外
    // C. 送信者は分母から除外
    // D. 送信後参加(created_at > item.created_at)は分母から除外
    // E. 退出済(status='left')は分子から除外
    // G. created_at が NULL の既存データは「参加済み」として扱う
    // ※index.html / signage.html の計6箇所で同一仕様を維持
    // ════════════════════════════════════════════════════════════
    const msgIds = messages.map(m => m.id);
    const handoverIds = handovers.map(h => h.id);

    const receipts = _globalSignageData.read_receipts || [];
    const confirmations = _globalSignageData.handover_confirmations || [];
    const allMembers = _globalSignageData.members || [];
    const allMembersHist = _globalSignageData.all_members_hist || [];
    const humanMembers = allMembers.filter(m => !m.is_signage);
    const humanCount = humanMembers.length;
    const signageUids = new Set(allMembersHist.filter(m => m.is_signage).map(m => m.eo_uid));
    // 参加時刻マップ(過去含む全メンバー)
    const memberJoinedAt = new Map();
    allMembersHist.forEach(m => {
      memberJoinedAt.set(m.eo_uid, new Date(m.created_at).getTime());
    });
    // 送信時刻・送信者マップ
    const msgCreatedAtMap = {};
    messages.forEach(m => { msgCreatedAtMap[m.id] = new Date(m.created_at).getTime(); });
    const hwCreatedAtMap = {};
    const hwSenderMap = {};
    handovers.forEach(h => {
      hwCreatedAtMap[h.id] = new Date(h.created_at).getTime();
      hwSenderMap[h.id] = h.sender_eo_uid;
    });

    // 既読数マップ（サイネージ端末・送信者・送信時点未参加を除外）
    const senderMap = {};
    messages.forEach(m => { senderMap[m.id] = m.sender_eo_uid; });
    const readCountMap = {};
    receipts.forEach(r => {
      if (signageUids.has(r.eo_uid)) return;                              // B
      if (senderMap[r.message_id] === r.eo_uid) return;                   // C
      const joinedAt = memberJoinedAt.get(r.eo_uid);
      if (joinedAt !== undefined && joinedAt > msgCreatedAtMap[r.message_id]) return; // D
      readCountMap[r.message_id] = (readCountMap[r.message_id] || 0) + 1;
    });

    // ── アンケート回答カウントマップを取得（is_survey=true のメッセージのみ対象）──
    // ─── signage-fetch 経由化: アンケート回答もキャッシュから取得 (チャッピー第68回判定 v2) ───
    const surveyResponseCountMap = {};
    try {
      const surveyMsgIds = messages.filter(m => m.is_survey === true).map(m => m.id);
      if (surveyMsgIds.length > 0) {
        const surveyMsgIdSet = new Set(surveyMsgIds);
        const allSurveyResps = _globalSignageData ? (_globalSignageData.survey_responses || []) : [];
        const resps = allSurveyResps.filter(r => surveyMsgIdSet.has(r.message_id));
        resps.forEach(r => {
          if (r.status === 'answered') {
            surveyResponseCountMap[r.message_id] = (surveyResponseCountMap[r.message_id] || 0) + 1;
          }
        });
      }
    } catch (e) {
      console.error('アンケート回答数取得失敗:', e);
    }

    // 確認済マップ（引き継ぎIDごとの確認者リスト）
    // サイネージ端末・送信者・送信時点未参加を除外
    const confirmedMap = {};
    confirmations.forEach(c => {
      if (signageUids.has(c.eo_uid)) return;                              // B
      if (hwSenderMap[c.handover_id] === c.eo_uid) return;                // C
      const joinedAt = memberJoinedAt.get(c.eo_uid);
      if (joinedAt !== undefined && joinedAt > hwCreatedAtMap[c.handover_id]) return; // D
      if (!confirmedMap[c.handover_id]) confirmedMap[c.handover_id] = [];
      confirmedMap[c.handover_id].push({ eo_uid: c.eo_uid, display_name: c.display_name });
    });

    // 引き継ぎに確認状況を付与
    // ※eligibleCount は引き継ぎごとに送信時点で在籍していた人間メンバー数を算出
    const handoverItems = handovers.map(h => {
      const hCreatedAt = hwCreatedAtMap[h.id];
      const hSender = hwSenderMap[h.id];
      const eligibleCount = humanMembers.filter(m => {
        if (m.eo_uid === hSender) return false;                           // C
        const joinedAt = memberJoinedAt.get(m.eo_uid);
        if (joinedAt !== undefined && joinedAt > hCreatedAt) return false; // D
        return true;
      }).length;
      const confirmed = (confirmedMap[h.id] || []).length;
      const isFullyConfirmed = eligibleCount > 0 && confirmed >= eligibleCount;
      return { ...h, body: h.content, _type: 'handover', _confirmed: confirmed, _fullyConfirmed: isFullyConfirmed };
    });
    const messageItems = messages.map(m => ({ ...m, _type: 'message' }));

    // 引き継ぎソート：新しい順のみ（重要度の色分けは表示側で維持）
    handoverItems.sort((a, b) => {
      return new Date(b.created_at) - new Date(a.created_at);
    });

    // 連絡ソート：新しい順のみ（重要度の色分けは表示側で維持）
    messageItems.sort((a, b) => {
      return new Date(b.created_at) - new Date(a.created_at);
    });

    // buildItemHtmlが参照するコンテキストを設定
    _buildItemContext = {
      allMembers, humanMembers, humanCount,
      readCountMap, confirmedMap, msgPriorityMap,
      surveyResponseCountMap,
      memberJoinedAt,  // [チャッピー第55-2回判定確定] buildItemHtml の receiver_count NULL フォールバック用
      allItemsFlat: [...handoverItems, ...messageItems]
    };

    // ① 引き継ぎセクション表示（②セクションタイトルも分離）
    const sectionHandover = document.getElementById('section-handover');
    const sectionDivider = document.getElementById('section-divider');
    const sectionMessage = document.getElementById('section-message');
    const msgSectionTitle = document.getElementById('message-section-title');
    const msgList = document.getElementById('message-list');

    if (handoverItems.length > 0) {
      sectionHandover.style.display = 'block';
      sectionDivider.style.display = 'block';
      _handoverAllItems = handoverItems;
      renderHandoverList(handoverItems, false);
    } else {
      sectionHandover.style.display = 'none';
      sectionDivider.style.display = 'none';
    }

    if (messageItems.length > 0) {
      // 連絡がある場合、セクションタイトルを「💬 連絡」にする
      msgSectionTitle.style.display = 'block';
      msgList.innerHTML = messageItems.map(item => buildItemHtml(item)).join('');
    } else if (handoverItems.length === 0) {
      // 両方ない場合
      msgSectionTitle.style.display = 'none';
      msgList.innerHTML = '<span class="no-message">本日の連絡はありません</span>';
    } else {
      // 引き継ぎのみある場合、連絡セクションは非表示
      msgSectionTitle.style.display = 'none';
      msgList.innerHTML = '';
    }

    updateLastUpdated();
  } catch (e) {
    console.error('メッセージ取得エラー:', e);
  }
}

function openModalByIndex(index) {
  const item = _buildItemContext.allItemsFlat[index];
  if (!item) return;
  const { allMembers, msgPriorityMap } = _buildItemContext;
  const p = item._type === 'handover'
    ? getHandoverLabel(item)
    : (msgPriorityMap[item.priority] || msgPriorityMap.normal);
  const createdAt = new Date(item.created_at);
  const mo = createdAt.getMonth() + 1;
  const dd = createdAt.getDate();
  const hh = String(createdAt.getHours()).padStart(2, '0');
  const mm = String(createdAt.getMinutes()).padStart(2, '0');
  const timeStr = mo + '月' + dd + '日 ' + hh + ':' + mm;
  openModal(item.body || '', p.label, p.cls, timeStr, item.id, item._type, item.sender_eo_uid || '', item.created_at || null);
}

async function openModal(body, priorityLabel, priorityCls, timeStr, itemId, itemType, senderUid, itemCreatedAt) {
  const modal = document.getElementById('modal-msg-detail');
  document.getElementById('modal-priority-badge').innerHTML =
    `<span class="message-priority ${priorityCls}">${priorityLabel}</span>`;
  // ⑦⑧ モーダル本文：メールアドレスはmailto、URLは外部ブラウザで開くリンクに変換
  document.getElementById('modal-body').innerHTML = linkifyBody(body);
  document.getElementById('modal-time').textContent = timeStr + ' 送信';
  document.getElementById('modal-members-info').innerHTML =
    '<div style="color:rgba(255,255,255,0.4); font-size:12px;">読み込み中...</div>';
  modal.style.display = 'flex';

  try {
    // ════════════════════════════════════════════════════════════
    // [詳細モーダル集計仕様 / チャッピー第55-2回判定確定 / 2026-05-18]
    // A. 分母は送信時点で approved だった人間メンバーのみ
    // B. サイネージ端末(is_signage=true)は分母・分子から除外
    // C. 送信者は分母から除外
    // D. 送信後参加(created_at > itemCreatedAt)は分母から除外
    // G. created_at が NULL の既存データは「参加済み」として扱う
    //    itemCreatedAt が null の場合は送信時点フィルタは無効化
    // ※index.html / signage.html の計6箇所で同一仕様を維持
    // ════════════════════════════════════════════════════════════
    // ─── signage-fetch 経由化 (チャッピー第68回判定 v2) ───
    // _globalSignageData から取得する (DB 直接アクセスを廃止)
    const members = _globalSignageData ? (_globalSignageData.members || []) : [];

    // 全メンバー(過去含む)取得 - サイネージ判定・参加時刻判定用
    const allMembersHist = _globalSignageData ? (_globalSignageData.all_members_hist || []) : [];

    const signageUidsModal = new Set((allMembersHist || []).filter(m => m.is_signage).map(m => m.eo_uid));
    const memberJoinedAtModal = new Map();
    (allMembersHist || []).forEach(m => {
      memberJoinedAtModal.set(m.eo_uid, new Date(m.created_at).getTime());
    });
    const itemCreatedAtMs = itemCreatedAt ? new Date(itemCreatedAt).getTime() : null;

    // 送信時点で在籍していた人間メンバー = 分母対象
    const humanMembers = (members || []).filter(m => {
      if (m.is_signage === true) return false;                            // B
      if (m.eo_uid === senderUid) return false;                           // C
      if (itemCreatedAtMs !== null) {
        const joinedAt = memberJoinedAtModal.get(m.eo_uid);
        if (joinedAt !== undefined && joinedAt > itemCreatedAtMs) return false; // D
      }
      return true;
    });

    // ════════════════════════════════════════════════════════════
    // [受信者スナップショット優先 / EO-DEC-0125 / 2026-07-16]
    // 連絡(message)で item_receivers があれば、それを未読名簿の正本にする。
    // → スマホ詳細画面(第124回)と同じ顔ぶれになり、端末間の食い違いを解消。
    // 無い過去分は従来の humanMembers（参考表示）のまま。
    // 対象は未読/既読名簿の「顔ぶれ」のみ。既読数字・バッジには影響しない。
    // ════════════════════════════════════════════════════════════
    let rosterMembers = humanMembers;
    if (itemType === 'message') {
      const allItemReceivers = _globalSignageData ? (_globalSignageData.item_receivers || []) : [];
      const snapshotRows = allItemReceivers.filter(ir => ir.item_id === itemId);
      if (snapshotRows.length > 0) {
        const snapshotUids = new Set(snapshotRows.map(ir => ir.receiver_eo_uid));
        rosterMembers = (members || []).filter(m => snapshotUids.has(m.eo_uid));
      }
    }

    let readUids = [];
    if (itemType === 'message') {
      // ─── signage-fetch 経由化: read_receipts はキャッシュから単一メッセージ分を抽出 ───
      const allReceipts = _globalSignageData ? (_globalSignageData.read_receipts || []) : [];
      const receipts = allReceipts.filter(r => r.message_id === itemId);
      readUids = (receipts || [])
        .filter(r => !signageUidsModal.has(r.eo_uid))                     // B
        .filter(r => r.eo_uid !== senderUid)                              // C
        .filter(r => {                                                    // D
          if (itemCreatedAtMs === null) return true;
          const j = memberJoinedAtModal.get(r.eo_uid);
          return j === undefined || j <= itemCreatedAtMs;
        })
        .map(r => r.eo_uid);
    } else {
      // ─── signage-fetch 経由化: handover_confirmations はキャッシュから単一引き継ぎ分を抽出 ───
      // 注: Edge Function 側で action カラムも含めて返却している
      const allConfirmations = _globalSignageData ? (_globalSignageData.handover_confirmations || []) : [];
      const confirmations = allConfirmations.filter(c => c.handover_id === itemId);
      readUids = (confirmations || [])
        .filter(c => !signageUidsModal.has(c.eo_uid))                     // B
        .filter(c => c.eo_uid !== senderUid)                              // C
        .filter(c => {                                                    // D
          if (itemCreatedAtMs === null) return true;
          const j = memberJoinedAtModal.get(c.eo_uid);
          return j === undefined || j <= itemCreatedAtMs;
        })
        .map(c => c.eo_uid);
    }

    const readMembers = rosterMembers.filter(m => readUids.includes(m.eo_uid));
    const unreadMembers = rosterMembers.filter(m => !readUids.includes(m.eo_uid));

    let html = '';
    if (itemType === 'message') {
      html = `
        <div style="margin-top:12px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <div style="font-size:11px; color:#66bb6a; margin-bottom:6px; font-weight:700;">✅ 既読（${readMembers.length}名）</div>
              ${readMembers.length === 0
                ? `<div style="font-size:12px; color:rgba(255,255,255,0.3);">なし</div>`
                : readMembers.map(m => `<div style="font-size:13px; color:#66bb6a; margin-bottom:4px;">✅ ${m.display_name}</div>`).join('')}
            </div>
            <div>
              <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px; font-weight:700;">❌ 未読 ${unreadMembers.length}名</div>
              ${unreadMembers.length === 0
                ? `<div style="font-size:12px; color:rgba(255,255,255,0.3);">未読のメンバーはいません</div>`
                : unreadMembers.map(m => `<div style="font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:4px;">⬜ ${m.display_name}</div>`).join('')}
            </div>
          </div>
        </div>
      `;
    } else {
      html = `
        <div style="margin-top:12px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px;">
          <div style="font-size:11px; color:#66bb6a; margin-bottom:8px; font-weight:700;">✅ 確認済（${readMembers.length}/${humanMembers.length}名）</div>
          ${readMembers.length === 0
            ? `<div style="font-size:12px; color:rgba(255,255,255,0.3);">まだ誰も確認していません</div>`
            : readMembers.map(m => `<div style="font-size:13px; color:#66bb6a; margin-bottom:4px;">✅ ${m.display_name}</div>`).join('')}
        </div>
      `;
    }
    document.getElementById('modal-members-info').innerHTML = html;
  } catch(e) {
    console.error('メンバー情報取得エラー:', e);
    document.getElementById('modal-members-info').innerHTML = '';
  }
}

// ═══════════════════════════════════════════
// [熱中症予防情報 2026/5/28 案B] 簡易WBGT(暑さ指数)近似・2値表示
// ═══════════════════════════════════════════
// 環境省 熱中症予防情報サイト採用の推定式(小野ら2014)を使用:
//   WBGT = 0.735*Ta + 0.0374*RH + 0.00292*Ta*RH
//          + 7.619*SR - 4.557*SR^2 - 0.0572*WS - 4.064
//   Ta:気温(℃) RH:相対湿度(%) SR:全天日射量(kW/m2) WS:平均風速(m/s)
// ※ Open-Meteo から取得した値で算出する「推定値」であり、
//   環境省公式の実測WBGTや現場の実環境(輻射熱源・局所条件)とは異なる。
//   表示は必ず「目安」と明示する。
//
// 表示仕様(案B):
//   ・配置: メッセージエリア直下・全幅・折りたたみ対象外
//   ・期間: 5月〜9月のみ表示
//   ・閾値: 現在値・最大予測値のどちらかが WBGT 21(注意)以上で表示
//          両方とも20以下なら完全非表示
//   ・色: 2つのうち高いレベルに合わせる
//   ・最大予測値: 今日1日の hourly 予測の最大値・日が変わるまで固定
function calcWBGT(Ta, RH, SR, WS) {
  // SR(全天日射量 kW/m2)・WS(風速 m/s)が無い場合は屋外夏季の代表値で補完
  const sr = (typeof SR === 'number' && !isNaN(SR)) ? SR : 0.2;  // 屋外夏季 概ね0.2
  const ws = (typeof WS === 'number' && !isNaN(WS)) ? WS : 1.0;  // 微風 1.0m/s
  const wbgt = 0.735 * Ta
             + 0.0374 * RH
             + 0.00292 * Ta * RH
             + 7.619 * sr
             - 4.557 * sr * sr
             - 0.0572 * ws
             - 4.064;
  return wbgt;
}

// WBGT値 → レベル情報(CSSクラス・アイコン・ラベル・ランク)に変換
// 注意未満は null を返す(=「ほぼ安全」相当・バッジでは控えめに表示)
function getHeatstrokeLevel(wbgt) {
  if (wbgt >= 31) return { cls: 'hs-danger',  icon: '🔥', label: '危険',     rank: 5 };
  if (wbgt >= 28) return { cls: 'hs-severe',  icon: '🥵', label: '厳重警戒', rank: 4 };
  if (wbgt >= 25) return { cls: 'hs-warning', icon: '⚠️', label: '警戒',     rank: 3 };
  if (wbgt >= 21) return { cls: 'hs-caution', icon: '💧', label: '注意',     rank: 2 };
  return null;
}

// 高い方のランクに応じた行動指針
function getHeatstrokeAdvice(rank) {
  if (rank >= 5) return '運動・屋外作業は原則中止。涼しい室内へ';
  if (rank >= 4) return '炎天下を避け、室内も室温に注意';
  if (rank >= 3) return 'こまめに休憩・水分補給を';
  return '運動・作業の合間に水分補給を';
}

// 2値バッジを描画する共通関数(成功時・失敗時の前回値再表示で共用)
// badge: { nowWBGT, maxWBGT } または null(非表示)
function renderHeatstroke(badge) {
  const el = document.getElementById('heatstroke-display');
  if (!el) return;
  if (!badge) {
    el.style.display = 'none';
    return;
  }
  const { nowWBGT, maxWBGT } = badge;
  const lvNow = getHeatstrokeLevel(nowWBGT);
  const lvMax = getHeatstrokeLevel(maxWBGT);

  // どちらも注意未満なら非表示
  if (!lvNow && !lvMax) {
    el.style.display = 'none';
    return;
  }

  // 色は高い方のランクに合わせる(両方ある場合は値の高い方)
  const higher = (lvMax && (!lvNow || lvMax.rank >= lvNow.rank)) ? lvMax : lvNow;
  el.className = 'heatstroke-bar-full ' + higher.cls;

  // 現在値・最大予測値の表示HTML(注意未満なら「ほぼ安全」と控えめに表示)
  const nowHtml = lvNow
    ? `${lvNow.icon} <span class="hs-section-value">${lvNow.label}</span>（${nowWBGT.toFixed(1)}）`
    : `<span class="hs-section-value" style="opacity:0.7;">ほぼ安全</span>（${nowWBGT.toFixed(1)}）`;
  const maxHtml = lvMax
    ? `${lvMax.icon} <span class="hs-section-value">${lvMax.label}</span>（${maxWBGT.toFixed(1)}）`
    : `<span class="hs-section-value" style="opacity:0.7;">ほぼ安全</span>（${maxWBGT.toFixed(1)}）`;

  // 1行目: タイトル「熱中症情報（暑さ指数 WBGT）」
  // 2行目: 今 ＋ 値 ／ 今日の最大 ＋ 値
  // 3行目: 行動指針 ＋ 注釈(目安)を1行統合(大画面なら1行・小画面なら自動折り返し)
  // 3行構成: タイトル / 値 / 行動指針+注釈(1行統合・改行禁止)
  el.innerHTML = `<div class="hs-title">🌡 熱中症情報（暑さ指数 WBGT）</div>`
               + `<div class="hs-values">`
               +   `<div class="hs-section"><span class="hs-section-label">今</span>${nowHtml}</div>`
               +   `<span class="hs-divider">／</span>`
               +   `<div class="hs-section"><span class="hs-section-label">今日の最大</span>${maxHtml}</div>`
               + `</div>`
               + `<div class="hs-advice">${getHeatstrokeAdvice(higher.rank)}<span class="hs-note-inline">　※気温・湿度からの推定の目安です</span></div>`;
  el.style.display = 'flex';
}

// ═══════════════════════════════════════════
// 天気・気温を取得・表示（Open-Meteo・APIキー不要）
// ═══════════════════════════════════════════
async function loadWeather() {
  const weatherRow = document.getElementById('weather-row');

  // ─── [天気フェイルセーフ強化 2026/5/28] ───
  // Open-Meteo を fetch する内部関数。失敗時は例外を投げる。
  // 毎時00分ちょうどの一時失敗対策として、1回だけ短いリトライを行う。
  async function fetchOpenMeteo(coords) {
    // [熱中症予防情報 2026/5/28 案B] current=現在値・hourly=今日の最大予測値算出用
    // hourly に気温・湿度・日射・風速を1時間刻みで取得し、今日0〜23時の最大WBGTを算出
    // [予報精度改善 2026/5/30] /v1/forecast(グローバルモデル) → /v1/jma(気象庁モデル) に変更
    // 気象庁5km高解像度予報を使用することで日本国内の予報精度を向上(tenki.jpと同じソース)
    // パラメータ・レスポンス形式は /v1/forecast と完全互換のためロジック変更不要
    const url = `https://api.open-meteo.com/v1/jma?latitude=${coords.lat}&longitude=${coords.lng}&current=temperature_2m,relative_humidity_2m,shortwave_radiation,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m,shortwave_radiation,wind_speed_10m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=2`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('天気API応答エラー: ' + res.status);
    return await res.json();
  }

  try {
    const region = currentGroupData.region || 'other';
    const coords = REGION_COORDS[region] || REGION_COORDS.other;
    // エリア名を表示
    const regionNameEl = document.getElementById('weather-region-name');
    if (regionNameEl && coords.name !== '---') {
      regionNameEl.textContent = '📍 ' + coords.name;
    }

    // ─── [天気フェイルセーフ強化 2026/5/28] 1回だけ自動リトライ ───
    // 毎時00分ジャストはアクセス集中等で一時的に失敗しやすいため、
    // 1回目が失敗したら4秒待って即リトライ（5分後の定期更新を待たない）。
    let data;
    try {
      data = await fetchOpenMeteo(coords);
    } catch (firstErr) {
      console.warn('[loadWeather] 1回目失敗、4秒後にリトライ:', firstErr?.message);
      await new Promise(r => setTimeout(r, 4000));
      data = await fetchOpenMeteo(coords); // 2回目も失敗したら catch へ
    }

    const daily = data.daily;
    const currentTemp = data.current ? Math.round(data.current.temperature_2m) : null;
    const days = ['今日', '明日'];

    let html = '';
    for (let i = 0; i < 2; i++) {
      const code = daily.weathercode[i];
      const tMax = Math.round(daily.temperature_2m_max[i]);
      const tMin = Math.round(daily.temperature_2m_min[i]);
      const w = getWeatherIcon(code);
      // 今日は現在気温を大きく表示、明日は最高気温を表示
      const mainTemp = (i === 0 && currentTemp !== null) ? currentTemp : tMax;
      html += `
        <div class="weather-day">
          <div class="weather-day-label">${days[i]}</div>
          <div class="weather-icon">${w.icon}</div>
          <div class="weather-temp">${mainTemp}°</div>
          <div class="weather-temp-range">↑${tMax}° ↓${tMin}°</div>
        </div>
      `;
    }
    weatherRow.innerHTML = html;

    // 祝日チェック（今日・明日）
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);

    const todayStr = toDateStr(today);
    const tomorrowStr = toDateStr(tomorrow);
    const holidayDisplay = document.getElementById('holiday-display');

    let holidayText = null;
    if (ALL_HOLIDAYS[todayStr]) {
      holidayText = '🎌 今日は ' + ALL_HOLIDAYS[todayStr] + ' です';
    } else if (ALL_HOLIDAYS[tomorrowStr]) {
      holidayText = '🎌 明日は ' + ALL_HOLIDAYS[tomorrowStr] + ' です';
    }
    if (holidayText) {
      holidayDisplay.textContent = holidayText;
      holidayDisplay.style.display = 'block';
    } else {
      holidayDisplay.style.display = 'none';
    }

    // ─── [熱中症予防情報 2026/5/28 案B] 2値WBGT算出(現在値+今日の最大予測値) ───
    // 夏季(5〜9月)のみ算出・バッジ表示
    let heatstrokeBadge = null;
    const month = today.getMonth() + 1; // 1〜12
    if (month >= 5 && month <= 9 && data.current) {
      // (1) 現在値WBGT
      const Ta = data.current.temperature_2m;
      const RH = data.current.relative_humidity_2m;
      const SR = (typeof data.current.shortwave_radiation === 'number')
                 ? data.current.shortwave_radiation / 1000 : undefined;
      const WS = (typeof data.current.wind_speed_10m === 'number')
                 ? data.current.wind_speed_10m / 3.6 : undefined;

      // (2) 今日の最大予測WBGT(hourly配列から今日の日付に該当する0〜23時を抽出して最大値)
      let maxWBGT = null;
      if (data.hourly && Array.isArray(data.hourly.time)) {
        const todayPrefix = toDateStr(today); // 'YYYY-MM-DD'
        const times = data.hourly.time;
        const temps = data.hourly.temperature_2m || [];
        const rhs = data.hourly.relative_humidity_2m || [];
        const srs = data.hourly.shortwave_radiation || [];
        const wss = data.hourly.wind_speed_10m || [];
        for (let i = 0; i < times.length; i++) {
          if (typeof times[i] !== 'string' || !times[i].startsWith(todayPrefix)) continue;
          const hTa = temps[i];
          const hRH = rhs[i];
          if (typeof hTa !== 'number' || typeof hRH !== 'number') continue;
          const hSR = (typeof srs[i] === 'number') ? srs[i] / 1000 : undefined;
          const hWS = (typeof wss[i] === 'number') ? wss[i] / 3.6 : undefined;
          const w = calcWBGT(hTa, hRH, hSR, hWS);
          if (maxWBGT === null || w > maxWBGT) maxWBGT = w;
        }
      }

      // (3) 両方の値が揃ったらバッジ情報として渡す(renderHeatstroke内で閾値判定)
      if (typeof Ta === 'number' && typeof RH === 'number') {
        const nowWBGT = calcWBGT(Ta, RH, SR, WS);
        heatstrokeBadge = {
          nowWBGT: nowWBGT,
          maxWBGT: (maxWBGT !== null) ? maxWBGT : nowWBGT  // hourlyが取れなければ現在値で代用
        };
      }
    }
    renderHeatstroke(heatstrokeBadge);

    // ─── [天気フェイルセーフ強化 2026/5/28] 成功時に前回値として保持 ───
    _lastWeatherHtml = html;
    _lastHolidayText = holidayText;
    _lastHeatstroke = heatstrokeBadge;
    _weatherEverSucceeded = true;

    updateLastUpdated();
  } catch (e) {
    // ⚠️ 天気取得失敗でも全体停止しない（設計書事故ポイント③）
    console.error('天気取得エラー:', e);

    // ─── [天気フェイルセーフ強化 2026/5/28] 前回データ保持 ───
    // 取得に一度でも成功していれば、前回の天気・祝日表示を維持する。
    // (古いデータでも「最終更新時刻」表示で鮮度が判別できるため誤認しない)
    // 一度も成功していない初回失敗時のみ「取得できませんでした」を表示する。
    if (_weatherEverSucceeded && _lastWeatherHtml) {
      weatherRow.innerHTML = _lastWeatherHtml;
      const holidayDisplay = document.getElementById('holiday-display');
      if (_lastHolidayText) {
        holidayDisplay.textContent = _lastHolidayText;
        holidayDisplay.style.display = 'block';
      } else {
        holidayDisplay.style.display = 'none';
      }
      // [熱中症予防情報 2026/5/28] 前回の熱中症バッジも維持
      renderHeatstroke(_lastHeatstroke);
      // ※ updateLastUpdated() は呼ばない＝最終更新時刻は前回成功時のまま維持
    } else {
      weatherRow.innerHTML = '<div class="weather-error">天気情報を取得できませんでした</div>';
    }
  }
}

// ═══════════════════════════════════════════
// QRコード生成
// ═══════════════════════════════════════════
function generateQR() {
  try {
    const joinUrl = 'https://lin.ee/5PZ1vPO'; // [5/18修正] LIFF直接URL→公式アカウント友達追加URL・QR読み取り時に友達追加ゲートを通す
    const container = document.getElementById('qr-canvas');
    container.innerHTML = '';

    // QRコードをLINE緑色で生成（誤り訂正レベルHでロゴを重ねても読める）
    new QRCode(container, {
      text: joinUrl,
      width: 120,
      height: 120,
      colorDark: '#06C755',   // LINE緑
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H  // ロゴを重ねるためHに変更
    });

    // QR生成完了後にLINEロゴを中央に重ねる
    setTimeout(() => {
      const qrImg = container.querySelector('img') || container.querySelector('canvas');
      if (!qrImg) return;

      // ラッパーをrelativeに
      container.style.position = 'relative';
      container.style.display = 'inline-block';

      // LINEロゴSVGを中央に配置
      const logoSize = 30;
      const logo = document.createElement('div');
      logo.style.cssText = `
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: ${logoSize}px; height: ${logoSize}px;
        background: #06C755;
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 0 3px white;
      `;
      // LINEロゴ（吹き出し形のみ・シンプル版）
      logo.innerHTML = `
        <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 5C13.5 5 5 12.3 5 21.3c0 6.4 3.9 12 9.8 15.3l-1.4 5.1c-.2.6.4.7.7.5l6.2-3.8c1.2.2 2.4.3 3.7.3 10.5 0 19-7.3 19-16.3S34.5 5 24 5z" fill="white"/>
        </svg>
      `;
      container.appendChild(logo);
    }, 200);

  } catch (e) {
    console.error('QR生成エラー:', e);
  }
}

// ═══════════════════════════════════════════
// オフライン検知
// ═══════════════════════════════════════════
function setupOfflineDetection() {
  const banner = document.getElementById('offline-banner');
  window.addEventListener('offline', () => { banner.classList.add('show'); });
  window.addEventListener('online',  () => { banner.classList.remove('show'); });
  if (!navigator.onLine) banner.classList.add('show');
}

// 縦横レイアウト判定（JSで強制制御）
function applyLayout() {
  // URLパラメータで強制指定可能（Fully Kiosk用）
  const params = new URLSearchParams(window.location.search);
  const forceLayout = params.get('layout'); // 'portrait' or 'landscape'
  
  let isPortrait;
  if (forceLayout === 'portrait') {
    isPortrait = true;
  } else if (forceLayout === 'landscape') {
    isPortrait = false;
  } else {
    // 複数の方法で縦画面を判定
    const bySize = window.innerHeight > window.innerWidth;
    const byScreen = screen.height > screen.width;
    const byOrientation = screen.orientation 
      ? screen.orientation.type.includes('portrait')
      : (window.orientation === 0 || window.orientation === 180);
    isPortrait = bySize || byScreen || byOrientation;
  }
  
  if (isPortrait) {
    document.body.classList.add('portrait');
  } else {
    document.body.classList.remove('portrait');
  }
}

function setupLayoutDetection() {
  applyLayout();
  window.addEventListener('resize', applyLayout);
  // orientationchangeイベントも監視
  window.addEventListener('orientationchange', () => {
    setTimeout(applyLayout, 100);
  });
}

// ═══════════════════════════════════════════
// 深夜3時 自動リロード（設計書事故ポイント⑦）
// ═══════════════════════════════════════════
function scheduleNightlyReload() {
  const now = new Date();
  const next3am = new Date();
  next3am.setHours(3, 0, 0, 0);
  if (next3am <= now) {
    next3am.setDate(next3am.getDate() + 1);
  }
  const ms = next3am - now;
  setTimeout(() => { location.reload(); }, ms);
}

// ═══════════════════════════════════════════
// 定期更新（5分ごと）
// ═══════════════════════════════════════════
function startPolling() {
  if (updateTimer) clearInterval(updateTimer);
  updateTimer = setInterval(async () => {
    // トークン再検証（設計書事故ポイント②：キャッシュしない）
    // ★ バグ⑥ 修正: オフライン時はトークン再検証をスキップ（誤検知防止）
    if (!navigator.onLine) {
      // オフラインバナーで通知済み・データ更新も意味がないのでスキップ
      return;
    }
    // ─── signage-fetch 経由化 (チャッピー第68回判定 v2 反映) ───
    // signage-fetch 1回呼び出しで「トークン再検証」と「全データ更新」を同時実施
    try {
      const data = await fetchSignageData();

      // ─── (A) 明示的なトークン無効 (INVALID_TOKEN / EXPIRED) のみ無効画面へ ───
      //     このときだけ localStorage の token も破棄し、ポーリングを止める
      if (isExplicitTokenInvalid(data)) {
        clearSignageToken();
        showError('サイネージが無効になりました', 'グループ管理者がトークンを再生成しました。\n一度グループを退出して、再度参加してください。');
        clearInterval(updateTimer);
        return;
      }

      // ─── (B) 一時障害はすべて表示維持 (第2回判定 GO・allowlist 方式) ───
      //     INTERNAL_ERROR=500 / SERVER_ERROR / NETWORK_ERROR / 不明 error_code 等。
      //     Supabase 一時障害・ネットワーク障害で「サイネージ無効」に落とさない。
      //     現在の表示をそのまま維持し、次の 5分後に再検証する。
      if (!data || !data.ok || !data.group) {
        console.warn('[startPolling] transient failure; keep current display:', data?.error_code);
        return;
      }

      // ─── (C) 正常応答: データ更新 ───
      currentGroupData = data.group;
      _globalSignageData = data;
    } catch (e) {
      // 例外も一時障害としてスキップ (表示維持)
      console.warn('[startPolling] exception; keep current display:', e?.message);
      return;
    }
    await loadMessage();
    await loadWeather();
  }, 5 * 60 * 1000); // 5分ごと
}

// ═══════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════
// グループ期限警告バーの表示制御
// ST版(SL-で始まるグループID)のみ対象
// 残り30日以下→黄色、残り7日以下→赤、それ以上は非表示
// ═══════════════════════════════════════════
function updateExpiryWarningBar() {
  const bar = document.getElementById('expiry-warning-bar');
  if (!bar) return;
  // ST版以外(EO-など)は対象外
  const groupId = currentGroupData?.group_id || '';
  if (!groupId.startsWith('SL-')) {
    bar.classList.remove('warning', 'danger');
    return;
  }
  if (!currentGroupData?.expires_at) {
    bar.classList.remove('warning', 'danger');
    return;
  }
  const exp = new Date(currentGroupData.expires_at);
  const now = new Date();
  const daysLeft = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
  bar.classList.remove('warning', 'danger');
  if (daysLeft > 30) return;
  bar.classList.add(daysLeft <= 7 ? 'danger' : 'warning');
  if (daysLeft <= 0) {
    bar.textContent = '⚠️ このグループは有効期限を過ぎています';
  } else {
    bar.textContent = `⚠️ あと${daysLeft}日でこのグループは使用できなくなります`;
  }
}

// ═══════════════════════════════════════════
async function init() {
  // リトライ経由の再入時は予約済みタイマーを解除 (多重 init 防止・第2回判定 GO)
  if (_authRetryTimer) { clearTimeout(_authRetryTimer); _authRetryTimer = null; }

  // ─── Supabase client 生成 (将来用に維持・現状は DB アクセスせず) ───
  // チャッピー第68回判定 v2 反映:
  // 全 DB アクセスは signage-fetch Edge Function 経由に統一されたため、
  // sbClient は実質的に未使用となる。ただし削除はせず変数定義のみ残す
  // (将来の機能追加や緊急のフォールバック用として安全側に倒す)
  sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 認証（3段階）- signage-fetch Edge Function 経由
  const ok = await authenticate();
  if (!ok) return;

  // 画面表示
  document.getElementById('header-group-name').textContent =
    currentGroupData.group_name || currentGroupData.group_id;

  // グループ期限警告バー表示(ST版=SL-で始まるグループのみ、残り30日以下で表示)
  updateExpiryWarningBar();

  // ④ 藤沢グループのみ混雑度ボタンを表示
  if (currentGroupData.region === 'fujisawa') {
    const vacanBtn = document.getElementById('vacan-btn');
    if (vacanBtn) { vacanBtn.style.display = 'flex'; vacanBtn.style.alignItems = 'center'; }
  }

  // [UI改善② LINKボタン] currentGroupData.link_url が設定されているグループのみLINKボタン表示
  updateLinkButtonSignage();

  showMain();

  // [UI改善③ 天気QR折りたたみ] localStorage から状態復元(初期は展開)
  restoreBottomAccordionState();

  setupOfflineDetection();
  setupLayoutDetection();
  scheduleNightlyReload();

  // データ取得（並列）
  await Promise.allSettled([
    loadMessage(),
    loadWeather(),
  ]);

  generateQR();
  startPolling();
}

// 起動
// ライブラリ読み込み待機（最大5秒）してから初期化
function waitForLibsAndInit() {
  let waited = 0;
  const check = () => {
    if (typeof window.supabase !== 'undefined') {
      init(); // QRCodeがなくてもinitは実行（generateQR内でtry/catchしている）
    } else if (waited < 5000) {
      waited += 100;
      setTimeout(check, 100);
    } else {
      // タイムアウト：supabaseだけ未読み込みなら諦めてエラー表示
      showError('ライブラリ読み込みエラー', 'ページを再読み込みしてください。');
    }
  };
  check();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', waitForLibsAndInit);
} else {
  waitForLibsAndInit();
}
